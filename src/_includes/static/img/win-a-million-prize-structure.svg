<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4B000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A8CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9D4EDD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B3DB5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4757;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC3945;stop-opacity:1" />
    </linearGradient>
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="650" height="400" fill="#1A1A2E" rx="12"/>
  <rect x="1" y="1" width="648" height="398" fill="none" stroke="#2D2D44" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="325" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Win A Million - Prize Tiers &amp; Odds</text>
  <text x="325" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#B8B8B8">Match numbers in position to win. Pick 4 numbers + 1 Millionaire Ball from 1-34.</text>

  <!-- Bar 1: 4 + Millionaire Ball = £1,000,000 (bar width 350px) -->
  <text x="168" y="100" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFD700">4 + Millionaire Ball</text>
  <rect x="175" y="82" width="350" height="36" fill="url(#goldGrad)" rx="4" filter="url(#glowGold)"/>
  <text x="185" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">£1,000,000</text>
  <text x="535" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFD700">1 in 33.4M</text>

  <!-- Bar 2: 4 Numbers = £20,000 (bar width 251px) -->
  <text x="168" y="150" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#00FF88">4 Numbers</text>
  <rect x="175" y="132" width="251" height="36" fill="url(#greenGrad)" rx="4"/>
  <text x="185" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">£20,000</text>
  <text x="436" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#00FF88">1 in 1.1M</text>

  <!-- Bar 3: 3 Numbers = £500 (bar width 157px) -->
  <text x="168" y="200" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#00D4FF">3 Numbers</text>
  <rect x="175" y="182" width="157" height="36" fill="url(#blueGrad)" rx="4"/>
  <text x="185" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">£500</text>
  <text x="342" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#00D4FF">1 in 8,976</text>

  <!-- Bar 4: 2 Numbers = £10 (bar width 58px) -->
  <text x="168" y="250" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#9D4EDD">2 Numbers</text>
  <rect x="175" y="232" width="58" height="36" fill="url(#purpleGrad)" rx="4"/>
  <text x="243" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#9D4EDD">£10</text>
  <text x="290" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#B8B8B8">1 in 187</text>

  <!-- Bar 5: 1 Number = £1 (bar width 25px) -->
  <text x="168" y="300" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FF4757">1 Number</text>
  <rect x="175" y="282" width="25" height="36" fill="url(#redGrad)" rx="4"/>
  <text x="210" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#FF4757">£1</text>
  <text x="250" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#B8B8B8">1 in 8.5</text>

  <!-- Highlight annotation -->
  <rect x="155" y="340" width="340" height="28" fill="#00FF88" fill-opacity="0.1" rx="14"/>
  <text x="325" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#00FF88">1 in every 9 entries wins a cash prize</text>

  <!-- Source -->
  <text x="325" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">Source: winamillion.com (February 2026). Odds based on positional matching.</text>
</svg>
