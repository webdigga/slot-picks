<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 420">
  <defs>
    <linearGradient id="tpgcGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4B000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tpgcGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tpgcGray" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1" />
    </linearGradient>
    <filter id="glowTPGC" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowTPGCGr" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#00FF88" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="650" height="420" fill="#1A1A2E" rx="12"/>
  <rect x="1" y="1" width="648" height="418" fill="none" stroke="#2D2D44" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="325" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">UK Competition Entry Costs Compared</text>
  <text x="325" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#B8B8B8">Shorter bars = lower cost to enter. Green = best value.</text>

  <!-- Section: Minimum Entry Cost -->
  <text x="30" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#00FF88">MINIMUM ENTRY COST</text>
  <line x1="30" y1="90" x2="620" y2="90" stroke="#2D2D44" stroke-width="1"/>

  <!-- Win A Million (50p) - 50px -->
  <text x="168" y="118" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#00FF88">Win A Million</text>
  <rect x="175" y="102" width="50" height="30" fill="url(#tpgcGreen)" rx="4" filter="url(#glowTPGCGr)"/>
  <text x="235" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#00FF88">50p</text>

  <!-- That Prize Guy (79p) - 79px -->
  <text x="168" y="158" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFD700">That Prize Guy</text>
  <rect x="175" y="142" width="79" height="30" fill="url(#tpgcGold)" rx="4" filter="url(#glowTPGC)"/>
  <text x="264" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFD700">79p</text>

  <!-- UK Lotto (£2) - 200px -->
  <text x="168" y="198" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#B8B8B8">UK Lotto</text>
  <rect x="175" y="182" width="200" height="30" fill="url(#tpgcGray)" rx="4"/>
  <text x="385" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#B8B8B8">£2.00</text>

  <!-- Omaze (£10) - 380px -->
  <text x="168" y="238" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#B8B8B8">Omaze</text>
  <rect x="175" y="222" width="380" height="30" fill="url(#tpgcGray)" rx="4"/>
  <text x="565" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#B8B8B8">£10.00</text>

  <!-- Divider -->
  <line x1="30" y1="274" x2="620" y2="274" stroke="#2D2D44" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Section: Known Odds -->
  <text x="30" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#FFD700">ODDS TRANSPARENCY</text>
  <line x1="30" y1="312" x2="620" y2="312" stroke="#2D2D44" stroke-width="1"/>

  <!-- That Prize Guy - Fixed caps -->
  <text x="168" y="340" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFD700">That Prize Guy</text>
  <rect x="175" y="324" width="350" height="30" fill="url(#tpgcGold)" rx="4" filter="url(#glowTPGC)"/>
  <text x="185" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1A1A2E">Fixed entry caps = known odds before entering</text>

  <!-- Others -->
  <text x="168" y="380" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#B8B8B8">Lotteries</text>
  <rect x="175" y="364" width="220" height="30" fill="url(#tpgcGray)" rx="4"/>
  <text x="185" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#B8B8B8">Fixed odds published in advance</text>

  <!-- Source -->
  <text x="325" y="414" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">Sources: thatprizeguy.com, winamillion.com, omaze.co.uk, national-lottery.co.uk (February 2026)</text>
</svg>