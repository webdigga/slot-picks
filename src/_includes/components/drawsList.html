{% import "./draw.html" as drawMacro with context %}

{% macro listOfDraws(title, drawType, description) %}

  <section>
    {% if title %}
      <div class="mb-8">
        <h2 class="text-text-primary mb-3">{{ title }}</h2>
        {% if description %}
          <p class="text-text-secondary text-base max-w-3xl">{{ description }}</p>
        {% endif %}
      </div>
    {% endif %}

    <div class="grid grid-cols-1 gap-6">
      {% for draw in collections[drawType] %}
        {{ drawMacro.draw(draw) }}
      {% endfor %}
    </div>
  </section>

{% endmacro %}
