{% macro filterBar(contentType) %}
  <div data-test="filterBar" data-content-type="{{ contentType }}" class="mb-8 p-4 bg-bg-card border border-border-dark rounded-xl">
    <div class="flex flex-wrap items-center gap-3">

      <!-- Sort Dropdown -->
      <div class="relative">
        <select data-test="sortSelect" class="appearance-none bg-bg-secondary border border-border-dark rounded-lg py-2 pl-3 pr-8 text-sm text-text-primary focus:outline-none focus:border-neon-green/50 cursor-pointer">
          <option value="date-desc">Newest First</option>
          <option value="score-desc">Score (High→Low)</option>
          <option value="score-asc">Score (Low→High)</option>
        </select>
        <svg class="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-4 text-text-muted pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </div>

      <!-- Divider -->
      <div class="w-px h-6 bg-border-dark hidden sm:block"></div>

      <!-- Filter Chips -->
      <button data-test="filterChip" data-filter="top-rated" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border border-border-dark text-text-secondary hover:border-neon-green/50 hover:text-neon-green transition-all duration-200">
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
        Top Rated (90+)
      </button>

      {% if contentType === 'sites' %}
        <button data-test="filterChip" data-filter="free-spins" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border border-border-dark text-text-secondary hover:border-neon-green/50 hover:text-neon-green transition-all duration-200">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          Free Spins
        </button>

        <button data-test="filterChip" data-filter="no-wagering" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border border-border-dark text-text-secondary hover:border-neon-green/50 hover:text-neon-green transition-all duration-200">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          No Wagering
        </button>
      {% endif %}

      <!-- Result Count (pushed to the right) -->
      <span data-test="resultCount" class="ml-auto text-xs text-text-muted"></span>
    </div>

    <!-- No Results Message -->
    <div data-test="noResults" class="hidden mt-4 text-center py-6">
      <p class="text-text-muted text-sm mb-2">No sites match your filters.</p>
      <button data-test="clearFilters" class="text-neon-green text-sm hover:underline">Clear all filters</button>
    </div>
  </div>
{% endmacro %}
