      - { label: "External URL", name: "externalUrl", widget: "string" }
      - { label: "Review URL", name: "reviewUrl", widget: "string", hint: "*e.g. /reviews/draw-name/*" }
      - { label: "Operator Info", name: "operatorInfo", widget: "string" }
      - widget: select
        label: "tags"
        name: "tags"
        multiple: true
        create: true
        options: ["topRatedDraws", "newDraws"]
      - {
        label: "Date Added",
        name: "date",
        widget: "datetime",
        date_format: "YYYY-MM-DD",
        time_format: false,
        required: false
      }
  - label: "Settings"
    name: "settings"
    files:
      - label: "Navigation"
        name: "items"
        file: "src/_data/navigation.yaml"
        fields:
          - label: Nav Items
            name: firstLevelItems
            widget: list
            collapsed: false
            allow_add: false
            fields:
              - { label: Title, name: text, widget: string }
              - { label: URL, name: url, widget: string }
              - label: Nav Items
                name: secondLevelItems
                widget: list
                collapsed: true
                fields:
                  - { label: Title, name: text, widget: string }
                  - { label: URL, name: url, widget: string }
              
      - label: "Meta Settings"
        name: "settings"
        file: "src/_data/settings.yaml"
        fields:
          - { label: Site Name, name: siteName, widget: string }
          - { label: Author, name: author, widget: string }
          - { label: Powered by 1, name: poweredByOne, widget: string }
          - { label: Powered by 2, name: poweredByTwo, widget: string }
          - { label: Powered by 1 URL, name: poweredByOneUrl, widget: string }
          - { label: Powered by 2 URL, name: poweredByTwoUrl, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Phone number, name: phoneNumber, widget: string }
          - { label: Company number, name: companyNumber, widget: string }
