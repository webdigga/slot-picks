backend:
  # Use netlify identity as backend
  name: git-gateway
  branch: main
media_folder: "src/_includes/static/img"
public_folder: "/_includes/static/img"

# Please run "npx netlify-cms-proxy-server" for local backend
local_backend: true
# publish_mode: editorial_workflow
collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - label: "Homepage Content"
        name: "homepage"
        file: "src/_data/seoIntroText.yaml"  # Path to the YAML file
        fields:
          - label: "SEO Intro Text"
            name: "seoIntroText"
            widget: "list"
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: false }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "paragraph", widget: "text" }
  - label: "Article"
    name: "articles"
    folder: "src/articles"
    create: true
    fields:
      - {
        label: "Title",
        name: "title",
        widget: "string",
        hint: "*This title will be used in the page's H1 tag, and also determines the URL (between 20 and 70 characters). If you want to make changes to this section after the page has been published then it's best to chat to David first.*",
        pattern: ['^.{20,70}$', "Must be between 20 and 70 characters"]
      }
      - { 
        label: "SEO Title",
        name: "seoTitle",
        widget: "string",
        hint: "*This title will be used in the title tag for search engines (between 50 and 60 characters). If you want to make changes to this section after the page has been published then it's best to chat to David first.*",
        pattern: ['^.{50,60}$', "Must be between 50 and 60 characters"]
      }
      - {
        label: "Description",
        name: "description",
        widget: "string",
        hint: "*Used in search engines (between 70 and 155 characters). If you want to make changes to this section after the page has been published then it's best to chat to David first.*",
        pattern: ['^.{70,155}$', "Must be between 70 and 155 characters"]
      }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Show Date?", name: "showDate", widget: "boolean", default: false, required: false }
      - {
        label: "Image for SEO",
        name: "imageForSeo",
        widget: "image",
        hint: "*This is required, just use any image that you have used in the main body of the article (Use 4:3 ratio, e.g. 600px x 450px)"
      }
      - {
        label: "Image Alt",
        name: "imageAlt",
        widget: "string"
      }
      - { label: "Body", name: "body", widget: "markdown" }
      - widget: select
        label: "type"
        name: "type"
        create: true
        options: ["article", "privacy"]
        default: "article"
      - widget: select
        label: "tags"
        name: "tags"
        multiple: true
        create: true
        options: ["article", "privacy", "faq", "news"]
        default: ["article"]
  - label: "Sites"
    name: "sites"
    folder: "src/sites"
    create: true
    fields:
      - {
        label: "Brand",
        name: "brand",
        widget: "image",
        hint: "*Should be 250px x 65px"
      }
      - {
        label: "Image Alt",
        name: "imageAlt",
        widget: "string"
      }
      - { label: 'Image Colour', name: 'imageColour', widget: 'color' }
      - { label: 'Border Colour', name: 'borderColour', widget: 'color', required: false }
      - {
        label: "Title",
        name: "title",
        widget: "string"
      }
      - {
        label: "SEO Title",
        name: "seoTitle",
        widget: "string",
        hint: "*Used in the title tag for search engines (50-60 characters)*",
        pattern: ['^.{50,60}$', "Must be between 50 and 60 characters"],
        required: false
      }
      - {
        label: "Description",
        name: "description",
        widget: "string",
        hint: "*Used in search engines (70-155 characters)*",
        pattern: ['^.{70,155}$', "Must be between 70 and 155 characters"],
        required: false
      }
      - {
        label: "Score",
        name: "score",
        widget: "number",
        min: 1,
        max: 100
      }
      - {
        label: "Rating",
        name: "rating",
        widget: "number",
        min: 1,
        max: 5
      }
      - label: Highlights
        name: highlights
        widget: list
        collapsed: false
        fields:
          - { label: Title, name: text, widget: string }
      - {
        label: "Welcome Offer",
        name: "welcomeOffer",
        widget: "string",
        required: false,
        hint: "*For slots/casinos only*"
      }
      - { label: "Verdict", name: "verdict", widget: "text", required: false }
      - label: "Pros"
        name: "pros"
        widget: "list"
        required: false
        field: { label: "Pro", name: "pro", widget: "string" }
      - label: "Cons"
        name: "cons"
        widget: "list"
        required: false
        field: { label: "Con", name: "con", widget: "string" }
      - { label: "Min Deposit", name: "minDeposit", widget: "string", required: false, hint: "*For slots/casinos only*" }
      - { label: "Withdrawal Time", name: "withdrawalTime", widget: "string", required: false, hint: "*For slots/casinos only*" }
      - { label: "Live Chat", name: "liveChat", widget: "boolean", default: false, required: false }
      - { label: "Mobile App", name: "mobileApp", widget: "boolean", default: false, required: false }
      - label: "Payment Methods"
        name: "paymentMethods"
        widget: "list"
        required: false
        hint: "*For slots/casinos only*"
        field: { label: "Method", name: "method", widget: "string" }
      - label: "Game Providers"
        name: "gameProviders"
        widget: "list"
        required: false
        hint: "*For slots/casinos only*"
        field: { label: "Provider", name: "provider", widget: "string" }
      - { label: "Jackpot", name: "jackpot", widget: "string", required: false, hint: "*For draws only*" }
      - { label: "Entry Cost", name: "entryCost", widget: "string", required: false, hint: "*For draws only*" }
      - { label: "Draw Frequency", name: "drawFrequency", widget: "string", required: false, hint: "*For draws only*" }
      - { label: "Prize Odds", name: "anyPrizeOdds", widget: "string", required: false, hint: "*For draws only*" }
      - widget: select
        label: "tags"
        name: "tags"
        multiple: true
        create: true
        options: ["slots", "topRatedSlots", "newSlots", "slotGames", "freeSpins", "videoSlots", "casinos", "topRatedCasinos", "newCasinos", "casinoGames", "freeCasinos", "liveCasinos", "drawReviews"]
      - widget: select
        label: "type"
        name: "type"
        create: false
        options: ["site"]
        default: "site"
      - { label: External URL, name: externalUrl, widget: string }
      - {
        label: "Date Added",
        name: "date",
        widget: "datetime",
        date_format: "YYYY-MM-DD",
        time_format: false,
        hint: "*Controls ordering on listing pages. Newest dates appear first.*"
      }
      - {
        label: "T&Cs",
        name: "termsAndConditions",
        widget: "string"
      }
      - { label: "Body", name: "body", widget: "markdown", required: false }
  - label: "Draws"
    name: "draws"
    folder: "src/draws"
    create: true
    fields:
      - {
        label: "Brand",
        name: "brand",
        widget: "image",
        hint: "*Should be 250px x 65px"
      }
      - { label: "Image Alt", name: "imageAlt", widget: "string" }
      - { label: 'Image Colour', name: 'imageColour', widget: 'color' }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Score", name: "score", widget: "number", min: 1, max: 100 }
      - { label: "Rating", name: "rating", widget: "number", min: 1, max: 5 }
      - { label: "Jackpot", name: "jackpot", widget: "string" }
      - { label: "Entry Cost", name: "entryCost", widget: "string" }
      - { label: "Draw Frequency", name: "drawFrequency", widget: "string" }
      - { label: "Prize Odds", name: "anyPrizeOdds", widget: "string" }
      - label: Highlights
        name: highlights
        widget: list
        collapsed: false
        fields:
